<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Books and Podcasts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d12;--bg-elev:#131720;--bg-card:#161c26;--border:#252d3a;--border-h:#36414f;--text:#e4ecf5;--text-dim:#8895a7;--text-faint:#5c6a7a;--accent:#7c5cff;--spotify:#1db954;--amazon:#ff9900;--c-history:#d29a4a;--c-politics:#ff7a59;--c-philosophy:#9b8cff;--c-learning:#4dd4c6;--c-geography:#5fb9ff;--c-fiction:#b97cff;--c-thriller:#ff5577;--c-mystery:#ffb84d;--c-science:#5fb9ff;--c-ww2:#e57373;--c-rome:#ff9a3c}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
#bg-img{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 0.6s ease}
.bg-overlay{position:fixed;inset:0;z-index:0;background:rgba(10,13,18,0.8);pointer-events:none}
.container{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:36px 24px 70px}
@media(max-width:680px){.container{padding:20px 14px 50px}}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:28px}
header h1{font-size:2rem;font-weight:800;letter-spacing:-0.025em;background:linear-gradient(130deg,#fff 0%,#c4baee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;align-items:center;gap:12px}
.week-label{font-size:0.8rem;color:var(--text-faint);font-weight:500;letter-spacing:0.03em}
.archive-btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;font-family:inherit;font-size:0.84rem;font-weight:500;cursor:pointer;transition:color 0.15s,border-color 0.15s,background 0.15s}
.archive-btn:hover{color:var(--text);border-color:var(--border-h)}
.search-wrap{margin-bottom:20px}
.search-bar{position:relative;max-width:460px}
.search-bar input{width:100%;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);padding:11px 42px 11px 16px;border-radius:10px;font-family:inherit;font-size:0.92rem;transition:border-color 0.15s}
.search-bar input::placeholder{color:var(--text-faint)}
.search-bar input:focus{outline:none;border-color:var(--accent)}
.clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:0.88rem;padding:4px;line-height:1;display:none}
.search-bar input:not(:placeholder-shown)+.clear-btn{display:block}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tab{display:inline-flex;align-items:center;gap:7px;background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;font-family:inherit;font-size:0.86rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:color 0.15s,border-color 0.15s,background 0.15s}
.tab:hover{color:var(--text);border-color:var(--border-h)}
.tab.active{color:#d6ccff;background:rgba(124,92,255,0.1);border-color:rgba(124,92,255,0.45);font-weight:600}
.tab .badge{background:rgba(255,255,255,0.06);color:var(--text-faint);padding:1px 7px;border-radius:10px;font-size:0.7rem;font-weight:600}
.tab.active .badge{background:rgba(124,92,255,0.22);color:#c0b4ff}
.section-title{font-size:1.15rem;font-weight:700;letter-spacing:-0.01em;color:var(--text);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:11px}
@media(max-width:500px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit;transition:border-color 0.14s,transform 0.12s,background 0.14s}
.card:hover{border-color:var(--border-h);transform:translateY(-3px);background:#1a2030}
.card:active{transform:translateY(-1px)}
.card .show-lbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);margin-bottom:2px}
.card .c-title{font-size:0.94rem;font-weight:700;line-height:1.35;color:var(--text)}
.card .c-sub{font-size:0.8rem;color:var(--text-dim);line-height:1.4}
.card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:2px 7px;border-radius:4px}
.tag.history{background:rgba(210,154,74,0.14);color:var(--c-history)}
.tag.politics{background:rgba(255,122,89,0.14);color:var(--c-politics)}
.tag.philosophy{background:rgba(155,140,255,0.14);color:var(--c-philosophy)}
.tag.learning{background:rgba(77,212,198,0.14);color:var(--c-learning)}
.tag.geography{background:rgba(95,185,255,0.14);color:var(--c-geography)}
.tag.fiction{background:rgba(185,124,255,0.14);color:var(--c-fiction)}
.tag.thriller{background:rgba(255,85,119,0.14);color:var(--c-thriller)}
.tag.mystery{background:rgba(255,184,77,0.14);color:var(--c-mystery)}
.tag.science{background:rgba(95,185,255,0.14);color:var(--c-science)}
.tag.ww2{background:rgba(229,115,115,0.14);color:var(--c-ww2)}
.tag.rome{background:rgba(255,154,60,0.14);color:var(--c-rome)}
.card .open-ln{margin-top:auto;padding-top:10px;font-size:0.79rem;font-weight:600;display:flex;align-items:center;gap:5px}
.card.podcast .open-ln{color:var(--spotify)}
.card.book .open-ln{color:var(--amazon)}
.card.article .open-ln{color:var(--accent)}
.open-ln svg{width:13px;height:13px;flex-shrink:0;fill:currentColor}
.empty{grid-column:1/-1;text-align:center;padding:48px 24px;color:var(--text-faint);font-size:0.9rem;border:1px dashed var(--border);border-radius:10px}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.65);display:none;align-items:flex-start;justify-content:flex-end}
.overlay.open{display:flex}
.archive-panel{width:min(640px,100vw);height:100vh;background:var(--bg-elev);border-left:1px solid var(--border);display:flex;flex-direction:column;animation:slide-in 0.25s ease}
@keyframes slide-in{from{transform:translateX(100%)}to{transform:translateX(0)}}
.arc-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.arc-head h2{font-size:1.1rem;font-weight:700}
.close-arc{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.3rem;padding:4px;line-height:1}
.close-arc:hover{color:var(--text)}
.arc-body{overflow-y:auto;flex:1;padding:20px 24px}
.arc-week{margin-bottom:24px}
.arc-week-label{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-faint);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.arc-section{margin-bottom:14px}
.arc-section-title{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);margin-bottom:8px}
.arc-list{display:flex;flex-direction:column;gap:6px}
.arc-item{display:flex;align-items:flex-start;gap:8px;font-size:0.83rem;line-height:1.4}
.arc-item a{color:var(--text-dim);text-decoration:none;transition:color 0.12s}
.arc-item a:hover{color:var(--text)}
.arc-item .arc-meta{font-size:0.73rem;color:var(--text-faint);flex-shrink:0;margin-top:1px}
.arc-empty{text-align:center;padding:48px 20px;color:var(--text-faint);font-size:0.9rem}
</style>
</head>
<body>

<div id="bg-img" aria-hidden="true"></div>
<div class="bg-overlay" aria-hidden="true"></div>

<div class="container">
  <header>
    <h1>Books and Podcasts</h1>
    <div class="header-right">
      <span class="week-label" id="week-label"></span>
      <button class="archive-btn" id="open-arc" aria-label="Open archive">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Archive
      </button>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Filter by title, author, show, topic…" autocomplete="off"/>
      <button class="clear-btn" id="clear-btn" aria-label="Clear">✕</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="rp">Recent Podcasts <span class="badge">10</span></button>
    <button class="tab" data-tab="op">Older Podcasts <span class="badge">20</span></button>
    <button class="tab" data-tab="rb">Recent Books <span class="badge">5</span></button>
    <button class="tab" data-tab="ob">Older Books <span class="badge">10</span></button>
    <button class="tab" data-tab="ar">Weekly Articles <span class="badge">20</span></button>
  </div>

  <p class="section-title" id="section-title"></p>
  <div class="grid" id="grid"></div>
</div>

<!-- Archive panel -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Archive">
  <div class="archive-panel">
    <div class="arc-head">
      <h2>Archive</h2>
      <button class="close-arc" id="close-arc" aria-label="Close">✕</button>
    </div>
    <div class="arc-body" id="arc-body"></div>
  </div>
</div>

/* ── Week calculation ────────────────────────────── */
var REF_MS = new Date('2026-05-19T00:00:00').getTime();
function getWeekIndex(){
  return Math.max(0, Math.floor((Date.now() - REF_MS) / (7*24*3600*1000)));
}
function weekLabel(idx){
  var d = new Date(REF_MS + idx*7*24*3600*1000);
  var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return 'Week of '+d.getDate()+' '+mn[d.getMonth()]+' '+d.getFullYear();
}

/* ── Slice pool for week ─────────────────────────── */
function weekItems(pool, per, weekIdx){
  var offset = (weekIdx * per) % pool.length;
  var out = [];
  for(var i=0;i<per;i++) out.push(pool[(offset+i)%pool.length]);
  return out;
}

var LAST_KEY = 'bp:lastWeek:v1';

function loadArchive(){
  try{return JSON.parse(localStorage.getItem(ARC_KEY)||'[]');}catch(e){return [];}
}
function saveArchive(a){
  try{localStorage.setItem(ARC_KEY,JSON.stringify(a));}catch(e){}
}

function runArchive(currentWeek){
  var last = parseInt(localStorage.getItem(LAST_KEY)||'-1',10);
  if(currentWeek <= last) return;
  var arc = loadArchive();
  /* archive every completed week between last and now */
  for(var w=Math.max(last,0); w<currentWeek; w++){
    if(!arc.find(function(a){return a.w===w;})){
      var entry = {w:w, label:weekLabel(w), saved:new Date().toISOString(), data:{}};
      Object.keys(TABS).forEach(function(k){
        var t=TABS[k];
        entry.data[k]={label:t.label, items:weekItems(t.pool,t.per,w)};
      });
      arc.push(entry);
    }
  }
  /* keep last 16 weeks */
  if(arc.length>16) arc=arc.slice(arc.length-16);
  saveArchive(arc);
  localStorage.setItem(LAST_KEY,currentWeek.toString());
}

/* ── Helpers ─────────────────────────────────────── */
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Build card element ──────────────────────────── */
function buildCard(item, tabKey){
  var t = TABS[tabKey];
  var a = document.createElement('a');
  a.className='card '+t.type;
  a.href=item.url; a.target='_blank'; a.rel='noopener noreferrer';

  var html='';
  if(t.type==='podcast'){
    html+='<div class="show-lbl">'+esc(item.show)+'</div>';
    html+='<div class="c-title">'+esc(item.title)+'</div>';
    html+='<div class="c-sub">'+esc(item.by)+'</div>';
  } else if(t.type==='book'){
    html+='<div class="show-lbl">'+esc(item.year)+'</div>';
    html+='<div class="c-title">'+esc(item.title)+'</div>';
    html+='<div class="c-sub">'+esc(item.author)+'</div>';
  } else {
    html+='<div class="show-lbl">'+esc(item.source)+'</div>';
    html+='<div class="c-title">'+esc(item.title)+'</div>';
  }
  var tagHtml=(item.tags||[]).map(function(t){
    return '<span class="tag '+esc(t)+'">'+esc(t)+'</span>';
  }).join('');
  html+='<div class="tags">'+tagHtml+'</div>';
  html+='<div class="open-ln">'+t.icon+' '+esc(t.openLabel)+' ↗</div>';
  a.innerHTML=html;
  return a;
}

/* ── Render grid ─────────────────────────────────── */
var activeTab='rp';
var currentWeek=0;

function renderGrid(tabKey, query){
  var t=TABS[tabKey];
  var items=weekItems(t.pool, t.per, currentWeek);
  var q=(query||'').toLowerCase().trim();
  if(q){
    items=items.filter(function(item){
      return [item.show,item.title,item.by,item.author,item.source,
              item.year,(item.tags||[]).join(' ')].join(' ').toLowerCase().indexOf(q)!==-1;
    });
  }
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  if(!items.length){
    var em=document.createElement('div');
    em.className='empty';
    em.textContent='No matches for "'+query+'"';
    grid.appendChild(em);
    return;
  }
  items.forEach(function(item){grid.appendChild(buildCard(item,tabKey));});
}

function switchTab(key){
  activeTab=key;
  document.querySelectorAll('.tab').forEach(function(b){
    b.classList.toggle('active',b.dataset.tab===key);
  });
  document.getElementById('section-title').textContent=TABS[key].label;
  renderGrid(key,document.getElementById('search-input').value);
  setBg(key);
}

/* ── Archive panel ───────────────────────────────── */
function renderArchive(){
  var arc=loadArchive().slice().reverse(); /* newest first */
  var body=document.getElementById('arc-body');
  body.innerHTML='';
  if(!arc.length){
    body.innerHTML='<div class="arc-empty">No archived weeks yet.<br>Check back after the first week has passed.</div>';
    return;
  }
  arc.forEach(function(entry){
    var wDiv=document.createElement('div');
    wDiv.className='arc-week';
    var lbl=document.createElement('div');
    lbl.className='arc-week-label'; lbl.textContent=entry.label;
    wDiv.appendChild(lbl);
    Object.keys(entry.data).forEach(function(k){
      var sec=entry.data[k];
      var sDiv=document.createElement('div'); sDiv.className='arc-section';
      var st=document.createElement('div'); st.className='arc-section-title';
      st.textContent=sec.label; sDiv.appendChild(st);
      var list=document.createElement('div'); list.className='arc-list';
      sec.items.forEach(function(item){
        var row=document.createElement('div'); row.className='arc-item';
        var meta=document.createElement('span'); meta.className='arc-meta';
        meta.textContent=(item.show||item.author||item.source||'')+'  ';
        var link=document.createElement('a');
        link.href=item.url; link.target='_blank'; link.rel='noopener noreferrer';
        link.textContent=item.title||item.source||'';
        row.appendChild(meta); row.appendChild(link);
        list.appendChild(row);
      });
      sDiv.appendChild(list); wDiv.appendChild(sDiv);
    });
    body.appendChild(wDiv);
  });
}

/* ── Events ──────────────────────────────────────── */
document.getElementById('tabs').addEventListener('click',function(e){
  var b=e.target.closest('.tab');
  if(b&&b.dataset.tab) switchTab(b.dataset.tab);
});
document.getElementById('search-input').addEventListener('input',function(){
  renderGrid(activeTab,this.value);
});
document.getElementById('clear-btn').addEventListener('click',function(){
  var inp=document.getElementById('search-input');
  inp.value=''; inp.focus(); renderGrid(activeTab,'');
});
document.getElementById('open-arc').addEventListener('click',function(){
  renderArchive();
  document.getElementById('overlay').classList.add('open');
});
document.getElementById('close-arc').addEventListener('click',function(){
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this) this.classList.remove('open');
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') document.getElementById('overlay').classList.remove('open');
});

/* ── Init ────────────────────────────────────────── */
function init(){
  currentWeek=getWeekIndex();
  runArchive(currentWeek);
  document.getElementById('week-label').textContent=weekLabel(currentWeek);
  switchTab('rp');
}
fetch('./recommendations.json')
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.rp&&d.rp.length) POOL.rp=d.rp;
    if(d.ar&&d.ar.length) POOL.ar=d.ar;
    init();
  })
  .catch(init);

})();
</script>
